<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B8DEF"/>
      <stop offset="1" stop-color="#2456D6"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8F0FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0A2A6E" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded-square background (pre-masked squircle-ish corners). -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Soft cloud backdrop — the "Cloud" in Cloud Skills Boost. -->
  <g fill="#FFFFFF" fill-opacity="0.16">
    <rect x="250" y="612" width="524" height="150" rx="75"/>
    <circle cx="392" cy="632" r="112"/>
    <circle cx="560" cy="580" r="150"/>
    <circle cx="702" cy="642" r="104"/>
  </g>

  <!-- Boost arrow — bold, upward. -->
  <g filter="url(#shadow)">
    <path fill="url(#arrow)" d="M512 214 L742 470 H628 V712 A44 44 0 0 1 584 756 H440 A44 44 0 0 1 396 712 V470 H282 Z"/>
  </g>
</svg>
