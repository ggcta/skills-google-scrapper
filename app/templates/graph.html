<!-- templates/cytograph.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Cytoscape Graph</title>
  <style>
    html, body, #cy { width:100%; height:100%; margin:0; }
  </style>
  <!-- Cytoscape.js from CDN -->
  <script src="https://unpkg.com/cytoscape@3.25.0/dist/cytoscape.min.js"></script>
</head>
<body style="background-color: #2c3e50;">
  <div id="cy"></div>
  <script>
    fetch('/graph-data')
      .then(r => r.json())
      .then(data => {
        const cy = cytoscape({
          container: document.getElementById('cy'),
          elements: data.elements,
          style: [
            {
              selector: 'node',
              style: {
                'label': 'data(label)',
                'text-valign': 'center',
                'color': '#dcdcdc',
                'text-outline-width': 0,
                'text-outline-color': '#555',
                'background-color': ele => {
                  const g = ele.data('group');
                  return g === 'course' ? '#1f78b4'
                       : g === 'lab'    ? '#33a02c'
                       : g === 'path'   ? '#e31a1c' // Added path color
                       : '#e31a1c'; // Default color for any other group
                },
                'width': '10',
                'height': '10'
              }
            },
            {
              selector: 'edge',
              style: {
                'width': 2,
                'line-color': '#bbb'
              }
            }
          ],
          layout: {
            name: 'cose',
            idealEdgeLength: 60,
            nodeOverlap: 10,
            animate: true
          }
        });
      })
      .catch(console.error);
  </script>
</body>
</html>
