<!-- templates/cytograph.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cytoscape Graph</title>
  <style>
    html, body, #cy {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #error-message {
      display: none;
      color: #e74c3c;
      font-size: 1.2em;
      text-align: center;
      margin-top: 20px;
    }
  </style>
  <!-- Cytoscape.js and Extensions -->
  <script src="https://unpkg.com/layout-base/layout-base.js"></script>
  <script src="https://unpkg.com/cose-base/cose-base.js"></script>
  <script src="https://unpkg.com/cytoscape@3.25.0/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/cytoscape-cose-bilkent/cytoscape-cose-bilkent.js"></script>
</head>
<body style="background-color: #2c3e50;">
  <div id="cy"></div>
  <div id="error-message">Failed to load the graph. Please try again later.</div>
  <script>
    // import cytoscape from 'cytoscape';
    // import coseBilkent from 'cytoscape-cose-bilkent';

    // cytoscape.use(require('cytoscape-cose-bilkent'));
    // Fetch graph data from the server
    fetch('/graph-data')
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        // Initialize Cytoscape
        const cy = cytoscape({
          container: document.getElementById('cy'),
          elements: data.elements,
          style: [
            {
              selector: 'node',
              style: {
                'label': 'data(name)',
                'text-valign': 'center',
                'color': '#ffffff',
                'text-outline-width': 2,
                'text-outline-color': '#000000',
                'background-color': ele => {
                  const g = ele.data('type').toLowerCase();  // Updated to lowercase for consistency
                  return g === 'course' ? '#1f78b4'
                       : g === 'lab'    ? '#33a02c'
                       : g === 'path'   ? '#e31a1c'
                       : '#aaaaaa';  // Fixed missing closing condition
                },
                'shape': ele => {
                  const g = ele.data('type').toLowerCase();  // Updated from 'group' to 'type'
                  return g === 'course' ? 'ellipse'
                       : g === 'lab'    ? 'circle'
                       : g === 'path'   ? 'rectangle'
                       : 'ellipse';
                },
                'width': 30,
                'height': 30
              }
            },
            {
              selector: 'edge',
              style: {
                'width': 1.5,
                'line-color': '#888',
                'curve-style': 'bezier',
                'target-arrow-shape': 'circle',
                'target-arrow-color': '#888'
              }
            }
          ],
          layout: {
            name: 'cose-bilkent',
            idealEdgeLength: 100,
            nodeRepulsion: 4500,
            edgeElasticity: 0.45,
            gravity: 0.25,
            animate: true
          }
        });

        // Add interactivity: Highlight connected nodes and edges
        cy.on('tap', 'node', function(evt) {
          const node = evt.target;
          const connectedEdges = node.connectedEdges();
          const connectedNodes = connectedEdges.connectedNodes();

          // Reset all elements
          cy.elements().removeClass('highlighted');

          // Highlight the selected node, its edges, and connected nodes
          node.addClass('highlighted');
          connectedEdges.addClass('highlighted');
          connectedNodes.addClass('highlighted');
        });

        // Add a class for highlighted elements
        cy.style().selector('.highlighted').style({
          'background-color': '#ffeb3b',
          'line-color': '#ffeb3b',
          'target-arrow-color': '#ffeb3b',
          'transition-property': 'background-color, line-color, target-arrow-color',
          'transition-duration': '0.5s'
        }).update();
      })
      .catch(error => {
        console.error('Error loading graph data:', error);
        document.getElementById('cy').style.display = 'none';
        document.getElementById('error-message').style.display = 'block';
      });
  </script>
</body>
</html>
